name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages and update badges

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup C++
        uses: aminya/setup-cpp@v1
        with:
          compiler: gcc-14
          gcov: true
          cmake: true
          ninja: true

      - name: Install LCOV, Doxygen, Graphviz
        run: sudo apt-get update && sudo apt-get install -y lcov doxygen graphviz

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure
        continue-on-error: true

      # --- COVERAGE GENERATION ---
      - name: Generate Coverage Report
        run: |
          lcov --gcov-tool gcov-14 --capture --directory . --output-file coverage.info
          
          lcov --extract coverage.info "$(pwd)/include/*" "$(pwd)/src/*" --output-file coverage_clean.info --ignore-errors unused          
          
          genhtml coverage_clean.info --output-directory coverage_html
          
          COVERAGE=$(lcov --summary coverage_clean.info | grep "lines......" | cut -d ':' -f 2 | cut -d '%' -f 1 | tr -d '[:space:]')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "BADGE_COLOR=red" >> $GITHUB_ENV
          elif (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "BADGE_COLOR=orange" >> $GITHUB_ENV
          else
            echo "BADGE_COLOR=brightgreen" >> $GITHUB_ENV
          fi

      # --- BADGE GENERATION (Gist Method) ---
      # This updates a Gist with the JSON data for shields.io
      - name: Create Coverage Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }} # You need to create a Gist and a Token
          gistID: 1a5fc2bac537cce52c590a74d4d192e3
          filename: coverage.json
          label: Coverage
          message: ${{ env.COVERAGE }}%
          color: ${{ env.BADGE_COLOR }}
          namedLogo: c++

      # --- DOCS GENERATION ---
      - name: Build API Documentation
        if: github.ref == 'refs/heads/master'
        run: |
          cmake -S . -B build_docs -DRBPS_BUILD_DOCS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build_docs --target docs

      # --- COMBINED gh-pages PAYLOAD ---
      # Assemble coverage + docs + a landing page into a single directory so
      # we deploy in one shot. Avoids race-y multi-step gh-pages publishes.
      - name: Assemble gh-pages content
        if: github.ref == 'refs/heads/master'
        run: |
          mkdir -p gh-pages-out/coverage gh-pages-out/docs
          cp -r coverage_html/. gh-pages-out/coverage/
          cp -r build_docs/docs/html/. gh-pages-out/docs/
          cat > gh-pages-out/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>RBPS</title>
              <style>
                body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 4em auto; padding: 0 1em; color: #222; }
                h1 { margin-bottom: 1em; }
                a.card { display: block; padding: 1em; margin: .75em 0; border: 1px solid #ddd; border-radius: .5em; text-decoration: none; color: inherit; }
                a.card:hover { background: #f6f8fa; }
                .title { font-weight: 600; font-size: 1.1em; }
                .desc { color: #666; font-size: .9em; margin-top: .25em; }
              </style>
            </head>
            <body>
              <h1>RBPS &mdash; Rigid Body Physics Simulator</h1>
              <a class="card" href="docs/">
                <div class="title">API Documentation</div>
                <div class="desc">Doxygen-generated reference for all public modules.</div>
              </a>
              <a class="card" href="coverage/">
                <div class="title">Coverage Report</div>
                <div class="desc">LCOV HTML report from the latest CI run.</div>
              </a>
            </body>
          </html>
          HTML

      # --- gh-pages DEPLOY ---
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-out
      
      - name: Run Tests
        id: run_tests
        working-directory: build
        run: ctest --output-on-failure
        continue-on-error: true

      - name: Extract & Debug Test Results
        if: always()
        run: |
          LOG_FILE="build/Testing/Temporary/LastTest.log"
          
          echo "=== DEBUG: STARTING EXTRACTION ==="
          echo "Step Outcome: ${{ steps.run_tests.outcome }}"
          
          if [ -f "$LOG_FILE" ]; then
            echo "Log file found."
            # Print the last 5 lines of the log so we can see the exact CTest summary
            tail -n 5 "$LOG_FILE"
            
            SUMMARY=$(grep -i "tests passed" "$LOG_FILE" | tail -n 1 || echo "")
            echo "Extracted Summary: $SUMMARY"
            
            TOTAL=$(echo "$SUMMARY" | sed -n 's/.*out of \([0-9]*\).*/\1/p')
            echo "Parsed Total: $TOTAL"
          else
            echo "ERROR: Log file NOT found at $LOG_FILE"
          fi

          # Logic Selection
          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            COLOR="brightgreen"
            MSG="${TOTAL:-passing}"
            [ "$MSG" != "passing" ] && MSG="$MSG/$MSG"
          else
            COLOR="red"
            MSG="failing"
          fi

          echo "Final Badge Msg: $MSG"
          echo "Final Badge Color: $COLOR"
          
          echo "FINAL_TESTS_MSG=$MSG" >> $GITHUB_ENV
          echo "FINAL_TESTS_COLOR=$COLOR" >> $GITHUB_ENV
          echo "=== DEBUG: END EXTRACTION ==="

      - name: Update Test Badge
        if: always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 1a5fc2bac537cce52c590a74d4d192e3
          filename: tests.json
          label: Tests
          message: ${{ env.FINAL_TESTS_MSG }}
          color: ${{ env.FINAL_TESTS_COLOR }}
          forceUpdate: true